services:

  broker:
    build:
      context: .
      dockerfile: Dockerfile
    image: cc7261:pyzmq
    container_name: broker
    volumes:
      - ./broker.py:/app/main.py
    ports:
      - 5555:5555
      - 5556:5556

  servidor:
    build:
      context: .
      dockerfile: Dockerfile_Server
    volumes:
      - ./servidor.py:/app/servidor.py
      - dados_servidor:/data 
    depends_on:
      - broker
      - pubsub-proxy
    deploy:
      replicas: 2
    environment:
    - SERVER_PORT=7000
    ports:
      - "7000-7001:7000"

  cliente:
    build:
      context: .
      dockerfile: Dockerfile_Client
    volumes:
      - ./cliente.java:/app/cliente.java
    depends_on:
      - servidor
    deploy:
      replicas: 2
    stdin_open: true
    tty: true

  pubsub-proxy:
    build: 
      context: .
      dockerfile: Dockerfile_Proxy
    container_name: pubsub-proxy
    command: python proxy.py
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - 5557:5557
      - 5558:5558
  
  reference:
    build: .
    container_name: reference
    command: python reference.py
    volumes:
      - ./reference.py:/app/reference.py
    ports:
      - "6000:6000"

volumes:
  dados_servidor: 