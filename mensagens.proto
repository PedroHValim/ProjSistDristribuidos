syntax = "proto3";

package mensagens;

message Requisicao {
  string tipo = 1;
  string usuario = 2;
  string canal = 3;
  int64 timestamp = 4;

  Publicacao pub = 5; // 🆕 opcional
}

message Publicacao {
  string mensagem = 1;
  int64 timestamp_envio = 2;
}

message Resposta {
  string mensagem = 1;
}